services:
  db:
    image: postgres:16-alpine
    container_name: finance_db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-finance_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-finance_pass}
      POSTGRES_DB: ${POSTGRES_DB:-finance_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-finance_user} -d ${POSTGRES_DB:-finance_db}"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: finance_api
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-finance_user}:${POSTGRES_PASSWORD:-finance_pass}@db:5432/${POSTGRES_DB:-finance_db}
      SECRET_KEY: ${SECRET_KEY:-change-me-in-production}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:-}
      TRUELAYER_CLIENT_ID: ${TRUELAYER_CLIENT_ID:-}
      TRUELAYER_CLIENT_SECRET: ${TRUELAYER_CLIENT_SECRET:-}
      TRUELAYER_REDIRECT_URI: ${TRUELAYER_REDIRECT_URI:-http://localhost:8000/api/v1/banking/callback}
      TRUELAYER_SANDBOX: ${TRUELAYER_SANDBOX:-true}
      # Optional: live pricing for stocks/ETFs (crypto works keyless). Absent → equities off.
      TWELVEDATA_API_KEY: ${TWELVEDATA_API_KEY:-}
      ENVIRONMENT: ${ENVIRONMENT:-development}
    ports:
      - "8000:8000"
    volumes:
      - ./api:/app
    depends_on:
      db:
        condition: service_healthy
    # Apply DB migrations on startup, then run the API (idempotent — safe on every boot)
    command: sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"

  ui:
    build:
      context: ./ui
      dockerfile: Dockerfile
    container_name: finance_ui
    ports:
      - "5173:5173"
    volumes:
      - ./ui:/app
      - /app/node_modules
    environment:
      - VITE_API_URL=http://localhost:8000
    command: npm run dev -- --host 0.0.0.0

  # Optional: produce/verify a production frontend build (tsc && vite build).
  # Run with:  docker compose run --rm ui-build
  ui-build:
    build:
      context: ./ui
      dockerfile: Dockerfile
    container_name: finance_ui_build
    volumes:
      - ./ui:/app
      - /app/node_modules
    profiles:
      - build
    command: npm run build

  test:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: finance_test
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-finance_user}:${POSTGRES_PASSWORD:-finance_pass}@db:5432/${POSTGRES_DB:-finance_db}_test
      SECRET_KEY: test-secret-key
      ENCRYPTION_KEY: oGRxJNK_WkqVxoVJyfsMqY9qSjZQMZd_xJ706DSh62o=
      ENVIRONMENT: test
    depends_on:
      db:
        condition: service_healthy
    profiles:
      - test
    command: pytest -v

volumes:
  postgres_data:
